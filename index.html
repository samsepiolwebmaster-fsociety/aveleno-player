<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Aveleno Player</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:linear-gradient(135deg,#06060E 0%,#0A0618 50%,#06060E 100%);display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Inter',system-ui,sans-serif;}
.trow:hover{background:#131228 !important;}
.trow:hover .tactions{opacity:1 !important;}
@keyframes ring{0%,100%{opacity:.15}50%{opacity:.6}}
@keyframes eq1{0%,100%{height:3px}50%{height:13px}}
@keyframes eq2{0%,100%{height:9px}35%{height:3px}70%{height:12px}}
@keyframes eq3{0%,100%{height:5px}30%{height:14px}65%{height:4px}}
@keyframes eq4{0%,100%{height:7px}45%{height:3px}80%{height:10px}}
@keyframes rainbow-glow{0%{box-shadow:0 0 90px #FF3CAC33,0 40px 120px rgba(0,0,0,.9)}33%{box-shadow:0 0 90px #FF8C4233,0 40px 120px rgba(0,0,0,.9)}66%{box-shadow:0 0 90px #9B5DE533,0 40px 120px rgba(0,0,0,.9)}100%{box-shadow:0 0 90px #FF3CAC33,0 40px 120px rgba(0,0,0,.9)}}
@keyframes progress-shimmer{0%{background-position:0% 50%}100%{background-position:200% 50%}}
input[type=range]{-webkit-appearance:none;appearance:none;background:transparent;height:3px;}
input[type=range]::-webkit-slider-runnable-track{background:#1A1835;height:3px;border-radius:2px;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#FF3CAC;margin-top:-4.5px;cursor:pointer;box-shadow:0 0 6px #FF3CAC88;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#1E1A35;border-radius:2px;}
::-webkit-scrollbar-thumb:hover{background:#9B5DE5;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef}=React;

// ── ID3v2 Parser ──────────────────────────────────────────────
function rssi(b,o){return((b[o]&127)<<21)|((b[o+1]&127)<<14)|((b[o+2]&127)<<7)|(b[o+3]&127);}
function decTxt(b,o,sz){
  if(sz<=1)return'';
  const enc=b[o],d=b.slice(o+1,o+sz);
  try{
    if(enc===1||enc===2)return new TextDecoder('utf-16').decode(d).replace(/\0+$/,'');
    if(enc===3)return new TextDecoder('utf-8').decode(d).replace(/\0+$/,'');
    return new TextDecoder('iso-8859-1').decode(d).replace(/\0+$/,'');
  }catch{return'';}
}
function parseID3(buf){
  const b=new Uint8Array(buf);
  const r={title:'',artist:'',album:'',cover:null};
  if(b[0]!==73||b[1]!==68||b[2]!==51)return r;
  const v=b[3],end=Math.min(10+rssi(b,6),b.length);
  let p=10;
  while(p<end-10){
    if(v===2){
      const id=String.fromCharCode(b[p],b[p+1],b[p+2]);
      const sz=(b[p+3]<<16)|(b[p+4]<<8)|b[p+5];p+=6;
      if(!sz||b[p-6]===0)break;
      if(id==='TT2')r.title=decTxt(b,p,sz);
      else if(id==='TP1')r.artist=decTxt(b,p,sz);
      else if(id==='TAL')r.album=decTxt(b,p,sz);
      else if(id==='PIC'&&!r.cover){let i=p+5;while(i<p+sz&&b[i])i++;r.cover=URL.createObjectURL(new Blob([b.slice(i+1,p+sz)],{type:'image/jpeg'}));}
      p+=sz;
    }else{
      const id=String.fromCharCode(b[p],b[p+1],b[p+2],b[p+3]);
      const sz=v===4?rssi(b,p+4):(b[p+4]<<24)|(b[p+5]<<16)|(b[p+6]<<8)|b[p+7];p+=10;
      if(!sz||b[p-10]===0)break;
      if(id==='TIT2')r.title=decTxt(b,p,sz);
      else if(id==='TPE1')r.artist=decTxt(b,p,sz);
      else if(id==='TALB')r.album=decTxt(b,p,sz);
      else if(id==='APIC'&&!r.cover){
        const enc=b[p];let i=p+1;
        while(i<p+sz&&b[i])i++;
        const mime=new TextDecoder('ascii').decode(b.slice(p+1,i))||'image/jpeg';
        i+=2;
        if(enc===1||enc===2){while(i<p+sz-1&&!(b[i]===0&&b[i+1]===0))i++;i+=2;}
        else{while(i<p+sz&&b[i])i++;i++;}
        r.cover=URL.createObjectURL(new Blob([b.slice(i,p+sz)],{type:mime}));
      }
      p+=sz;
    }
  }
  return r;
}
function ft(s){if(!s||isNaN(s))return'0:00';return`${Math.floor(s/60)}:${(~~(s%60)).toString().padStart(2,'0')}`;}
let _uid=0;

const C={
  bg:'#06060E',panel:'#0D0D1F',bar:'#09091A',border:'#1E1A35',
  hover:'#131228',active:'#1A1840',
  accent:'#FF3CAC',accentB:'#9B5DE5',accentG:'#FF8C42',
  cyan:'#00F5FF',green:'#06D6A0',yellow:'#FFD166',
  text:'#F0F0FF',sub:'#7070A8',muted:'#363660',
};
const EQ_COLORS=['#FF3CAC','#FF8C42','#FFD166','#06D6A0','#00F5FF','#9B5DE5','#FF3CAC','#FF8C42','#FFD166'];

// ── SVG Icons (inline, no lucide CDN needed) ──────────────────
const Icon=({d,size=16,color='currentColor',strokeW=2,fill='none'})=>(
  <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color} strokeWidth={strokeW} strokeLinecap="round" strokeLinejoin="round">
    {Array.isArray(d)?d.map((p,i)=><path key={i} d={p}/>):<path d={d}/>}
  </svg>
);
const icons={
  play:'M5 3l14 9-14 9V3z',
  pause:'M6 4h4v16H6zM14 4h4v16h-4z',
  skipB:'M19 20L9 12l10-8v16zM5 4v16',
  skipF:'M5 4l10 8-10 8V4zM19 4v16',
  vol:'M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07',
  mute:['M11 5L6 9H2v6h4l5 4V5z','M23 9l-6 6','M17 9l6 6'],
  shuf:'M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5',
  rep:'M17 1l4 4-4 4M3 11V9a4 4 0 014-4h14M7 23l-4-4 4-4M21 13v2a4 4 0 01-4 4H3',
  plus:'M12 5v14M5 12h14',
  search:'M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z',
  upload:'M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12',
  x:'M18 6L6 18M6 6l12 12',
  list:'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2M9 12h6M9 16h4',
  disc:'M12 2a10 10 0 100 20A10 10 0 0012 2zM12 8a4 4 0 100 8 4 4 0 000-8zM12 12h.01',
};

function App(){
  const[lib,setLib]=useState([]);
  const[queue,setQueue]=useState([]);
  const[qi,setQi]=useState(-1);
  const[isPlay,setIsPlay]=useState(false);
  const[time,setTime]=useState(0);
  const[dur,setDur]=useState(0);
  const[vol,setVol]=useState(0.8);
  const[muted,setMuted]=useState(false);
  const[shuf,setShuf]=useState(false);
  const[rep,setRep]=useState(0);
  const[view,setView]=useState('lib');
  const[pls,setPls]=useState([]);
  const[plId,setPlId]=useState(null);
  const[srch,setSrch]=useState('');
  const[drop,setDrop]=useState(false);
  const[newN,setNewN]=useState('');
  const[addPl,setAddPl]=useState(false);
  const[ctxId,setCtxId]=useState(null);

  const audioR=useRef(new Audio());
  const fileR=useRef();
  const barR=useRef();
  const shufR=useRef(shuf),repR=useRef(rep),qiR=useRef(qi),qR=useRef(queue);
  useEffect(()=>{shufR.current=shuf},[shuf]);
  useEffect(()=>{repR.current=rep},[rep]);
  useEffect(()=>{qiR.current=qi},[qi]);
  useEffect(()=>{qR.current=queue},[queue]);

  const cur=queue[qi]??null;

  useEffect(()=>{
    const a=audioR.current;
    const onT=()=>setTime(a.currentTime);
    const onD=()=>setDur(a.duration||0);
    const onE=()=>{
      const q=qR.current,i=qiR.current,r=repR.current,s=shufR.current;
      if(r===2){a.currentTime=0;a.play();return;}
      const nx=s?Math.floor(Math.random()*q.length):(i+1)%q.length;
      if(!s&&i>=q.length-1&&r===0){setIsPlay(false);return;}
      setQi(nx);a.src=q[nx].url;a.play().catch(()=>{});setIsPlay(true);
    };
    a.addEventListener('timeupdate',onT);
    a.addEventListener('durationchange',onD);
    a.addEventListener('ended',onE);
    return()=>{a.removeEventListener('timeupdate',onT);a.removeEventListener('durationchange',onD);a.removeEventListener('ended',onE);};
  },[]);

  useEffect(()=>{audioR.current.volume=muted?0:vol;},[vol,muted]);

  const playT=(trk,list)=>{
    const q2=list??lib;const i=q2.findIndex(x=>x.id===trk.id);
    if(i<0)return;
    setQueue(q2);setQi(i);
    const a=audioR.current;a.src=trk.url;a.volume=muted?0:vol;
    a.play().catch(()=>{});setIsPlay(true);
  };

  const tog=()=>{
    const a=audioR.current;
    if(!cur){if(lib[0])playT(lib[0]);return;}
    if(isPlay){a.pause();setIsPlay(false);}
    else{a.play().catch(()=>{});setIsPlay(true);}
  };

  const skipF=(d)=>{
    if(!queue.length)return;
    if(d<0&&time>3){audioR.current.currentTime=0;return;}
    const nx=shuf?Math.floor(Math.random()*queue.length):((qi+d)+queue.length)%queue.length;
    setQi(nx);const a=audioR.current;a.src=queue[nx].url;a.play().catch(()=>{});setIsPlay(true);
  };

  const seek=(e)=>{
    if(!dur||!barR.current)return;
    const rc=barR.current.getBoundingClientRect();
    audioR.current.currentTime=((e.clientX-rc.left)/rc.width)*dur;
  };

  const impF=async(files)=>{
    const valid=Array.from(files).filter(f=>f.type.startsWith('audio/')||/\.(mp3|flac|wav|ogg|aac|m4a)$/i.test(f.name));
    const tracks=await Promise.all(valid.map(async f=>{
      const url=URL.createObjectURL(f);
      let tags={title:'',artist:'',album:'',cover:null};
      try{tags=parseID3(await f.arrayBuffer());}catch{}
      return{id:++_uid,title:tags.title||f.name.replace(/\.[^.]+$/,''),artist:tags.artist||'Unknown',album:tags.album||'—',cover:tags.cover,url};
    }));
    setLib(p=>[...p,...tracks]);
  };

  const plTracks=plId?(pls.find(p=>p.id===plId)?.tids??[]).map(id=>lib.find(t=>t.id===id)).filter(Boolean):lib;
  const shown=(view==='pl'&&plId?plTracks:lib).filter(t=>!srch||
    t.title.toLowerCase().includes(srch.toLowerCase())||
    t.artist.toLowerCase().includes(srch.toLowerCase())
  );
  const pct=dur?(time/dur)*100:0;
  const repLabels=['No repeat','Repeat all','Repeat one'];

  const btn=(onClick,children,extra={})=>(
    <button onClick={onClick} style={{background:'none',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',borderRadius:'8px',padding:'6px',transition:'all .2s',...extra}}>
      {children}
    </button>
  );

  return(
    <div style={{minHeight:'100vh',background:C.bg,display:'flex',alignItems:'center',justifyContent:'center',padding:'20px'}}
      onDragOver={e=>{e.preventDefault();setDrop(true);}}
      onDragLeave={e=>{if(!e.currentTarget.contains(e.relatedTarget))setDrop(false);}}
      onDrop={e=>{e.preventDefault();setDrop(false);impF(e.dataTransfer.files);}}
      onClick={()=>setCtxId(null)}>

      <div style={{width:'800px',maxWidth:'100%',background:C.panel,border:`1px solid ${drop?C.accent:C.border}`,borderRadius:'18px',overflow:'hidden',
        animation:drop?'none':'rainbow-glow 6s ease-in-out infinite',
        boxShadow:drop?`0 0 90px ${C.accent}55,0 40px 120px rgba(0,0,0,.9)`:'',transition:'all .3s'}}>

        {/* Title bar */}
        <div style={{background:C.bar,padding:'10px 18px',display:'flex',alignItems:'center',borderBottom:`1px solid ${C.border}`}}>
          <div style={{display:'flex',gap:'6px'}}>
            {['#FF5F57','#FFBD2E','#28CA41'].map(c=><div key={c} style={{width:11,height:11,borderRadius:'50%',background:c,boxShadow:`0 0 6px ${c}66`}}/>)}
          </div>
          <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:'8px'}}>
            <div style={{width:18,height:18,borderRadius:'4px',background:'linear-gradient(135deg,#FF3CAC,#FF8C42)',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <Icon d={icons.disc} size={10} color="white"/>
            </div>
            <span style={{background:'linear-gradient(90deg,#FF3CAC,#FF8C42,#FFD166,#06D6A0,#00F5FF,#9B5DE5)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text',fontSize:12,letterSpacing:'0.25em',fontWeight:800}}>AVELENO</span>
            <span style={{color:C.sub,fontSize:12,letterSpacing:'0.15em'}}>PLAYER</span>
          </div>
          <span style={{color:C.muted,fontSize:11}}>{lib.length} tracks</span>
        </div>

        {/* Body */}
        <div style={{display:'flex',height:'460px'}}>

          {/* Left: Now Playing */}
          <div style={{width:'205px',flexShrink:0,borderRight:`1px solid ${C.border}`,padding:'18px 15px',display:'flex',flexDirection:'column',gap:'12px'}}>
            <div style={{width:'100%',aspectRatio:'1',borderRadius:'10px',overflow:'hidden',background:'#09091A',
              border:`1px solid ${cur?.cover?'transparent':C.border}`,display:'flex',alignItems:'center',justifyContent:'center',position:'relative',flexShrink:0,
              boxShadow:isPlay&&cur?.cover?`0 4px 30px ${C.accent}44`:'none',transition:'box-shadow .5s'}}>
              {cur?.cover
                ?<img src={cur.cover} style={{width:'100%',height:'100%',objectFit:'cover'}} alt="cover"/>
                :<div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'8px',opacity:.4}}>
                   <Icon d={icons.disc} size={46} color={C.sub}/>
                   <span style={{color:C.sub,fontSize:9,letterSpacing:'0.15em'}}>NO TRACK</span>
                 </div>}
              {isPlay&&<div style={{position:'absolute',inset:0,borderRadius:'10px',border:`1.5px solid ${C.accent}`,animation:'ring 2.5s ease-in-out infinite',pointerEvents:'none'}}/>}
            </div>

            <div style={{textAlign:'center',overflow:'hidden'}}>
              <div style={{color:C.text,fontWeight:700,fontSize:13,marginBottom:3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{cur?.title??'—'}</div>
              <div style={{color:C.sub,fontSize:11,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{cur?.artist??'Select a track'}</div>
              <div style={{color:C.muted,fontSize:10,marginTop:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{cur?.album??''}</div>
            </div>

            <div style={{display:'flex',gap:'3px',alignItems:'flex-end',justifyContent:'center',height:'22px',padding:'0 10px'}}>
              {[1,2,3,4,5,4,3,2,1].map((h,i)=>(
                <div key={i} style={{flex:1,borderRadius:'2px 2px 0 0',background:isPlay?EQ_COLORS[i]:C.muted,
                  animation:isPlay?`eq${(i%4)+1} ${0.55+i*0.06}s ease-in-out infinite`:'none',
                  height:`${h*2.2}px`,transition:'background .4s',
                  boxShadow:isPlay?`0 0 6px ${EQ_COLORS[i]}99`:'none'}}/>
              ))}
            </div>

            <button onClick={()=>fileR.current.click()}
              style={{marginTop:'auto',padding:'9px 10px',borderRadius:'8px',border:`1px dashed ${C.accentB}`,background:'transparent',
                color:C.accent,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:'6px',
                fontSize:12,fontWeight:600,letterSpacing:'0.04em',transition:'all .2s'}}
              onMouseEnter={e=>{e.currentTarget.style.background=C.hover;e.currentTarget.style.borderColor=C.accent;}}
              onMouseLeave={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.borderColor=C.accentB;}}>
              <Icon d={icons.upload} size={13} color={C.accent}/> Import files
            </button>
            <input ref={fileR} type="file" accept="audio/*,.mp3,.flac,.wav,.ogg,.aac,.m4a" multiple style={{display:'none'}} onChange={e=>impF(e.target.files)}/>
          </div>

          {/* Right */}
          <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
            {/* Tab bar */}
            <div style={{padding:'10px 14px',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',gap:'10px',background:C.bar}}>
              <div style={{display:'flex',gap:'2px',background:'#08081A',padding:'3px',borderRadius:'8px',border:`1px solid ${C.border}`}}>
                {[['lib','Library'],['pl','Playlists']].map(([v,l])=>(
                  <button key={v} onClick={()=>{setView(v);if(v==='lib')setPlId(null);}}
                    style={{padding:'4px 14px',borderRadius:'5px',border:'none',cursor:'pointer',fontSize:12,fontWeight:700,letterSpacing:'0.05em',
                      background:view===v?C.accent:'transparent',color:view===v?'white':C.sub,transition:'all .2s'}}>{l}</button>
                ))}
              </div>
              {view==='lib'&&(
                <div style={{flex:1,display:'flex',alignItems:'center',gap:'7px',background:'#08081A',border:`1px solid ${C.border}`,borderRadius:'7px',padding:'5px 10px'}}>
                  <Icon d={icons.search} size={11} color={C.muted}/>
                  <input value={srch} onChange={e=>setSrch(e.target.value)} placeholder="Search tracks, artists..."
                    style={{background:'none',border:'none',outline:'none',color:C.text,fontSize:12,width:'100%'}}/>
                  {srch&&<button onClick={()=>setSrch('')} style={{background:'none',border:'none',color:C.muted,cursor:'pointer',padding:0,lineHeight:0,display:'flex'}}><Icon d={icons.x} size={11} color={C.muted}/></button>}
                </div>
              )}
            </div>

            {/* Content */}
            {view==='pl'&&!plId?(
              <div style={{flex:1,overflow:'auto',padding:'12px 10px'}}>
                <div style={{display:'flex',justifyContent:'flex-end',marginBottom:'10px',padding:'0 4px'}}>
                  {addPl?(
                    <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
                      <input value={newN} onChange={e=>setNewN(e.target.value)} autoFocus
                        onKeyDown={e=>{
                          if(e.key==='Enter'){setPls(p=>[...p,{id:++_uid,name:newN.trim()||'New Playlist',tids:[]}]);setNewN('');setAddPl(false);}
                          if(e.key==='Escape')setAddPl(false);
                        }}
                        placeholder="Playlist name..."
                        style={{background:'#08081A',border:`1px solid ${C.border}`,borderRadius:'7px',padding:'6px 12px',color:C.text,fontSize:12,outline:'none',width:'150px'}}/>
                      <button onClick={()=>{setPls(p=>[...p,{id:++_uid,name:newN.trim()||'New Playlist',tids:[]}]);setNewN('');setAddPl(false);}}
                        style={{padding:'6px 14px',background:C.accent,border:'none',borderRadius:'7px',color:'white',cursor:'pointer',fontSize:12,fontWeight:700}}>Create</button>
                    </div>
                  ):(
                    <button onClick={()=>setAddPl(true)}
                      style={{padding:'6px 14px',background:C.accent,border:'none',borderRadius:'7px',color:'white',cursor:'pointer',fontSize:12,fontWeight:700,display:'flex',alignItems:'center',gap:'5px',boxShadow:`0 0 16px ${C.accent}44`}}>
                      <Icon d={icons.plus} size={12} color="white"/> New Playlist
                    </button>
                  )}
                </div>
                {pls.length===0?(
                  <div style={{textAlign:'center',color:C.muted,marginTop:'60px',fontSize:13,lineHeight:1.8}}>
                    No playlists yet.<br/><span style={{fontSize:11}}>Create one, then add tracks from Library.</span>
                  </div>
                ):pls.map(pl=>(
                  <div key={pl.id} onClick={()=>setPlId(pl.id)}
                    style={{display:'flex',alignItems:'center',gap:'12px',padding:'10px 14px',borderRadius:'10px',border:`1px solid ${C.border}`,marginBottom:'6px',cursor:'pointer',transition:'all .15s'}}
                    onMouseEnter={e=>{e.currentTarget.style.background=C.hover;e.currentTarget.style.borderColor=C.accentB;}}
                    onMouseLeave={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.borderColor=C.border;}}>
                    <div style={{width:38,height:38,borderRadius:'8px',background:'linear-gradient(135deg,#FF3CAC,#9B5DE5)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                      <Icon d={icons.list} size={16} color="white"/>
                    </div>
                    <div style={{flex:1}}>
                      <div style={{color:C.text,fontSize:13,fontWeight:600}}>{pl.name}</div>
                      <div style={{color:C.muted,fontSize:11,marginTop:1}}>{pl.tids.length} track{pl.tids.length!==1?'s':''}</div>
                    </div>
                    <button onClick={e=>{e.stopPropagation();if(window.confirm(`Delete "${pl.name}"?`))setPls(p=>p.filter(x=>x.id!==pl.id));}}
                      style={{background:'none',border:'none',color:C.muted,cursor:'pointer',padding:'4px',borderRadius:'5px',display:'flex'}}
                      onMouseEnter={e=>e.currentTarget.style.color='#FF5F57'} onMouseLeave={e=>e.currentTarget.style.color=C.muted}>
                      <Icon d={icons.x} size={13} color="currentColor"/>
                    </button>
                    <span style={{color:C.muted,fontSize:18}}>›</span>
                  </div>
                ))}
              </div>
            ):(
              <div style={{flex:1,overflow:'auto',position:'relative'}}>
                {view==='pl'&&plId&&(
                  <div style={{padding:'8px 14px',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',gap:'10px',background:C.bar,position:'sticky',top:0,zIndex:5}}>
                    <button onClick={()=>setPlId(null)}
                      style={{background:'none',border:'none',color:C.sub,cursor:'pointer',fontSize:12,padding:'2px 6px',borderRadius:'5px',display:'flex',alignItems:'center',gap:'3px',transition:'color .2s'}}
                      onMouseEnter={e=>e.currentTarget.style.color=C.text} onMouseLeave={e=>e.currentTarget.style.color=C.sub}>
                      ← Back
                    </button>
                    <span style={{color:C.text,fontSize:13,fontWeight:700}}>{pls.find(p=>p.id===plId)?.name}</span>
                    <span style={{color:C.muted,fontSize:11,marginLeft:'auto'}}>{plTracks.length} tracks</span>
                    {plTracks.length>0&&<button onClick={()=>playT(plTracks[0],plTracks)}
                      style={{padding:'4px 12px',background:C.accent,border:'none',borderRadius:'6px',color:'white',cursor:'pointer',fontSize:11,fontWeight:700,display:'flex',alignItems:'center',gap:'4px'}}>
                      <Icon d={icons.play} size={10} color="white" fill="white"/> Play all
                    </button>}
                  </div>
                )}
                {shown.length===0?(
                  <div style={{textAlign:'center',color:C.muted,marginTop:'80px',fontSize:13,lineHeight:2}}>
                    {drop?<span style={{color:C.accent,fontSize:15}}>📂 Drop files here!</span>:
                     lib.length===0?<>Drop MP3 files anywhere<br/><span style={{fontSize:11}}>or use the Import button</span></>:
                     view==='pl'&&plId?<>This playlist is empty.<br/><span style={{fontSize:11}}>Add tracks from Library using +</span></>:
                     'No results found.'}
                  </div>
                ):shown.map(trk=>{
                  const act=cur?.id===trk.id;
                  return(
                    <div key={trk.id} className="trow"
                      style={{display:'flex',alignItems:'center',gap:'10px',padding:'7px 14px',cursor:'pointer',
                        background:act?C.active:'transparent',borderLeft:`2px solid ${act?C.accent:'transparent'}`,transition:'background .1s,border-color .2s'}}
                      onClick={()=>playT(trk,shown)}>
                      <div style={{width:36,height:36,borderRadius:'7px',overflow:'hidden',background:'#09091A',flexShrink:0,
                        display:'flex',alignItems:'center',justifyContent:'center',position:'relative',border:`1px solid ${act?C.accentB:C.border}`}}>
                        {trk.cover?<img src={trk.cover} style={{width:'100%',height:'100%',objectFit:'cover'}} alt=""/>:<Icon d={icons.disc} size={14} color={C.muted}/>}
                        {act&&isPlay&&(
                          <div style={{position:'absolute',inset:0,background:'rgba(20,10,40,.75)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                            <div style={{display:'flex',gap:'2px',alignItems:'flex-end',height:'14px'}}>
                              {[0,1,2].map(i=><div key={i} style={{width:'2px',borderRadius:'1px',background:EQ_COLORS[i],animation:`eq${i+1} ${0.5+i*0.07}s ease-in-out infinite`}}/>)}
                            </div>
                          </div>
                        )}
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:13,fontWeight:act?700:400,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
                          background:act?'linear-gradient(90deg,#FF3CAC,#FF8C42)':'none',WebkitBackgroundClip:act?'text':'unset',WebkitTextFillColor:act?'transparent':'unset',backgroundClip:act?'text':'unset',color:act?'transparent':C.text}}>{trk.title}</div>
                        <div style={{color:C.muted,fontSize:11,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginTop:1}}>{trk.artist}</div>
                      </div>
                      <div className="tactions" style={{display:'flex',gap:'2px',opacity:0,transition:'opacity .2s'}}>
                        {pls.length>0&&view==='lib'&&(
                          <div style={{position:'relative'}} onClick={e=>e.stopPropagation()}>
                            <button onClick={()=>setCtxId(ctxId===trk.id?null:trk.id)} title="Add to playlist"
                              style={{width:26,height:26,borderRadius:'5px',border:'none',background:'none',color:C.sub,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',transition:'all .15s'}}
                              onMouseEnter={e=>{e.currentTarget.style.background=C.hover;e.currentTarget.style.color=C.accentG;}}
                              onMouseLeave={e=>{e.currentTarget.style.background='none';e.currentTarget.style.color=C.sub;}}>
                              <Icon d={icons.plus} size={13} color="currentColor"/>
                            </button>
                            {ctxId===trk.id&&(
                              <div style={{position:'absolute',right:0,top:'100%',background:'#0E0E20',border:`1px solid ${C.border}`,borderRadius:'9px',zIndex:30,minWidth:'155px',padding:'5px',boxShadow:`0 12px 40px rgba(0,0,0,.7),0 0 0 1px ${C.accentB}44`}}>
                                <div style={{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:'0.1em',padding:'4px 10px 6px'}}>ADD TO PLAYLIST</div>
                                {pls.map(pl=>(
                                  <div key={pl.id}
                                    onClick={()=>{setPls(ps=>ps.map(p=>p.id===pl.id&&!p.tids.includes(trk.id)?{...p,tids:[...p.tids,trk.id]}:p));setCtxId(null);}}
                                    style={{padding:'7px 10px',borderRadius:'6px',cursor:'pointer',color:C.text,fontSize:12,display:'flex',alignItems:'center',gap:'8px',transition:'background .1s'}}
                                    onMouseEnter={e=>e.currentTarget.style.background=C.hover}
                                    onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                                    <Icon d={icons.list} size={11} color={C.accent}/>{pl.name}
                                    {pl.tids.includes(trk.id)&&<span style={{marginLeft:'auto',color:C.muted,fontSize:10}}>✓</span>}
                                  </div>
                                ))}
                              </div>
                            )}
                          </div>
                        )}
                        <button onClick={e=>{
                          e.stopPropagation();
                          if(cur?.id===trk.id){audioR.current.pause();setIsPlay(false);setQi(-1);setQueue([]);}
                          setLib(l=>l.filter(x=>x.id!==trk.id));
                          setPls(ps=>ps.map(p=>({...p,tids:p.tids.filter(i=>i!==trk.id)})));
                        }} title="Remove"
                          style={{width:26,height:26,borderRadius:'5px',border:'none',background:'none',color:C.muted,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',transition:'all .15s'}}
                          onMouseEnter={e=>{e.currentTarget.style.background='rgba(255,95,87,.12)';e.currentTarget.style.color='#FF5F57';}}
                          onMouseLeave={e=>{e.currentTarget.style.background='none';e.currentTarget.style.color=C.muted;}}>
                          <Icon d={icons.x} size={13} color="currentColor"/>
                        </button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>

        {/* Controls bar */}
        <div style={{background:C.bar,borderTop:`1px solid ${C.border}`,padding:'12px 20px 15px'}}>
          <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'11px'}}>
            <span style={{color:C.muted,fontSize:11,width:'34px',textAlign:'right',fontVariantNumeric:'tabular-nums'}}>{ft(time)}</span>
            <div ref={barR} onClick={seek}
              style={{flex:1,height:'3px',background:C.border,borderRadius:'2px',cursor:'pointer',position:'relative',transition:'height .15s'}}
              onMouseEnter={e=>e.currentTarget.style.height='5px'} onMouseLeave={e=>e.currentTarget.style.height='3px'}>
              <div style={{position:'absolute',left:0,top:0,height:'100%',borderRadius:'2px',width:`${pct}%`,background:'linear-gradient(90deg,#FF3CAC,#FF8C42,#FFD166,#06D6A0,#00F5FF,#9B5DE5)',transition:'width .1s'}}/>
              <div style={{position:'absolute',top:'50%',left:`${pct}%`,transform:'translate(-50%,-50%)',width:'12px',height:'12px',borderRadius:'50%',background:'linear-gradient(135deg,#FF3CAC,#FF8C42)',boxShadow:'0 0 10px #FF3CAC',border:`2px solid ${C.bar}`,transition:'left .1s',pointerEvents:'none'}}/>
            </div>
            <span style={{color:C.muted,fontSize:11,width:'34px',fontVariantNumeric:'tabular-nums'}}>{ft(dur)}</span>
          </div>

          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{display:'flex',alignItems:'center',gap:'8px',width:'155px'}}>
              <button onClick={()=>setMuted(m=>!m)}
                style={{background:'none',border:'none',color:muted?C.muted:C.sub,cursor:'pointer',padding:'4px',display:'flex',transition:'color .2s'}}>
                <Icon d={muted?icons.mute:icons.vol} size={15} color="currentColor"/>
              </button>
              <input type="range" min={0} max={1} step={0.01} value={muted?0:vol}
                onChange={e=>{setVol(parseFloat(e.target.value));setMuted(false);}}
                style={{width:'88px',cursor:'pointer'}}/>
            </div>

            <div style={{display:'flex',alignItems:'center',gap:'5px'}}>
              <button onClick={()=>setShuf(s=>!s)}
                style={{width:32,height:32,borderRadius:'8px',border:'none',background:shuf?'rgba(6,214,160,.12)':'none',color:shuf?C.green:C.muted,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',transition:'all .2s'}}>
                <Icon d={icons.shuf} size={15} color="currentColor"/>
              </button>
              <button onClick={()=>skipF(-1)}
                style={{width:34,height:34,borderRadius:'8px',border:'none',background:C.hover,color:C.text,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',transition:'background .2s'}}
                onMouseEnter={e=>e.currentTarget.style.background=C.active} onMouseLeave={e=>e.currentTarget.style.background=C.hover}>
                <Icon d={icons.skipB} size={17} color={C.text}/>
              </button>
              <button onClick={tog}
                style={{width:50,height:50,borderRadius:'50%',border:'none',background:'linear-gradient(135deg,#FF3CAC,#FF8C42)',color:'white',cursor:'pointer',
                  display:'flex',alignItems:'center',justifyContent:'center',
                  boxShadow:isPlay?'0 0 32px #FF3CAC99,0 0 16px #FF8C4255':'0 2px 8px rgba(0,0,0,.4)',transition:'box-shadow .4s,transform .1s'}}
                onMouseEnter={e=>e.currentTarget.style.transform='scale(1.07)'} onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}>
                <Icon d={isPlay?icons.pause:icons.play} size={20} color="white" fill="white"/>
              </button>
              <button onClick={()=>skipF(1)}
                style={{width:34,height:34,borderRadius:'8px',border:'none',background:C.hover,color:C.text,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',transition:'background .2s'}}
                onMouseEnter={e=>e.currentTarget.style.background=C.active} onMouseLeave={e=>e.currentTarget.style.background=C.hover}>
                <Icon d={icons.skipF} size={17} color={C.text}/>
              </button>
              <button onClick={()=>setRep(r=>(r+1)%3)} title={repLabels[rep]}
                style={{width:32,height:32,borderRadius:'8px',border:'none',background:rep>0?'rgba(0,245,255,.10)':'none',color:rep>0?C.cyan:C.muted,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',position:'relative',transition:'all .2s'}}>
                <Icon d={icons.rep} size={15} color="currentColor"/>
                {rep===2&&<span style={{position:'absolute',top:4,right:3,width:9,height:9,borderRadius:'50%',background:C.cyan,border:`1.5px solid ${C.bar}`,fontSize:6,display:'flex',alignItems:'center',justifyContent:'center',color:'#06060E',fontWeight:800}}>1</span>}
              </button>
            </div>

            <div style={{width:'155px',textAlign:'right'}}>
              <span style={{color:drop?C.accent:C.muted,fontSize:11,transition:'color .3s',letterSpacing:'0.02em'}}>
                {drop?'📂 Drop here!':'drag & drop to import'}
              </span>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
